name: Pipeline CD

on:
  workflow_run:
    workflows: ["Pipeline CI"]
    types:
      - completed
    branches:
      - test

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: fofana12

jobs:
  publish-images:
    name: Publication Images Docker
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Récupération de code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Connexion a GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: ./express-prisma-test-starter-new
          file: ./express-prisma-test-starter-new/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/api:latest

      - name: Build Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./vue-orders-manager
          file: ./vue-orders-manager/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/frontend:latest
          build-args: VITE_API_URL=http://77.42.122.227:4000/api

  deploy:
    name: Deploiement sur VPS
    runs-on: ubuntu-latest
    needs: publish-images

    steps:
      - name: Récupération de code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Copier docker compose prod
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.V_HOST }}
          username: ${{ secrets.V_USER }}
          key: ${{ secrets.V_KEY }}
          source: "docker-compose.prod.yml"
          target: "/var/www/app"

      - name: Deploiement sur serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.V_HOST }}
          username: ${{ secrets.V_USER }}
          key: ${{ secrets.V_KEY }}
          script: |
            cd /var/www/app
            docker login ghcr.io -u fofana12 -p ${{ secrets.GITHUB_TOKEN }}
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
            docker image prune -af
