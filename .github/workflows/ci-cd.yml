name: Pipeline CI/CD

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OWNER: fofana12

jobs:
  test-api:
    name: Exécution tests API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: express-prisma-test-starter-new

    env:
      PORT: 3000
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: 3306
      NODE_ENV: prod
      DATABASE_URL: mysql://root:${{ secrets.DB_PASSWORD }}@127.0.0.1:3306/${{ secrets.DB_NAME }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
            --health-cmd="mysqladmin ping -h localhost"
            --health-interval=5s
            --health-timeout=5s
            --health-retries=20

    steps:
      - name: Récupération de code
        uses: actions/checkout@v6

      - name: Installation Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: express-prisma-test-starter-new/package-lock.json

      - name: Installation dépendances
        run: npm install

      - name: Config Prisma Client
        run: npx prisma generate

      - name: Exécution des migration
        run: npx prisma migrate deploy

      - name: Exécution tests API
        run: npm test

  build-fontend:
    name: Build du Frontend
    runs-on: ubuntu-latest
    needs: test-api
    
    defaults:
      run:
        working-directory: vue-orders-manager
    
    steps:
      - name: Récupération de code
        uses: actions/checkout@v6

      - name: Installation Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vue-orders-manager/package-lock.json

      - name: Installation dépendances
        run: npm install

      - name: Build de App
        run: npm run build

  publish-images:
    name: Publication Images Docker
    runs-on: ubuntu-latest
    needs: build-fontend

    steps:
      - name: Récupération de code
        uses: actions/checkout@v6

      - name: Connexion a GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: ./express-prisma-test-starter-new
          file: ./express-prisma-test-starter-new/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/api:latest

      - name: Build Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./vue-orders-manager
          file: ./vue-orders-manager/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/frontend:latest
          build-args: VITE_API_URL=http://77.42.122.227:4000/api

  deploy:
    name: Deploiement sur VPS
    runs-on: ubuntu-latest
    needs: publish-images

    steps:
      - name: Récupération de code
        uses: actions/checkout@v6

      - name: Copier docker compose prod
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.V_HOST }}
          username: ${{ secrets.V_USER }}
          key: ${{ secrets.V_KEY }}
          source: "docker-compose.prod.yml"
          target: "/var/www/app"

      - name: Deploiement sur serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.V_HOST }}
          username: ${{ secrets.V_USER }}
          key: ${{ secrets.V_KEY }}
          script: |
            cd /var/www/app
            docker login ghcr.io -u fofana12 -p ${{ secrets.GITHUBTOKEN }}
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
            docker image prune -af
          


    