services:
  frontend:
    image: ghcr.io/fofana12/frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "8080:5173"

  api:
    image: ghcr.io/fofana12/api:latest
    container_name: express-api
    restart: always
    env_file:
      - .env.prod
    ports:
      - "4000:3000"
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm start"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    env_file:
      - .env.prod
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: